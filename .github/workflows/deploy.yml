name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Replace 'sharvarianand' and 'vedaai-backend' with your exact Hugging Face username and Space name
        run: |
          git push --force https://user:$HF_TOKEN@huggingface.co/spaces/sharvarianand/vedaai-backend main
