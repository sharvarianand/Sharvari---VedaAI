name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Replace 'sharvarianand' and 'vedaai-backend' with your exact Hugging Face username and Space name
        run: |
          mkdir -p deploy
          cp -r backend deploy/backend
          cp Dockerfile deploy/Dockerfile
          cp hf-readme.md deploy/README.md
          cd deploy
          git init
          git checkout -b main
          git config user.name "Deployment-Bot"
          git config user.email "bot@vedaai.local"
          git add .
          git commit -m "Automated deployment"
          git push --force https://user:$HF_TOKEN@huggingface.co/spaces/sharvarianand/vedaai-backend main
